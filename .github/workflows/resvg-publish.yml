name: 'resvg-publish'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to clone'
        required: true
        type: string

jobs:
  build:
    name: build-${{ matrix.artifact_arch }}
    runs-on: ${{ matrix.runner }}
    permissions: { contents: read }

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_arch: arm64
            arch: arm64
            rust_target: aarch64-apple-darwin
            macos_min: '11.0'
            runner: macos-latest
          - artifact_arch: x64
            arch: x86_64
            rust_target: x86_64-apple-darwin
            macos_min: '10.13'
            runner: macos-15-intel

    env:
      MACOS_MIN: ${{ matrix.macos_min }}
      RESVG_ARTIFACT_ARCH: ${{ matrix.artifact_arch }}
      RESVG_BUILD_ARCH: ${{ matrix.arch }}
      RESVG_REF: ${{ github.event.inputs.tag }}
      RESVG_RUST_TARGET: ${{ matrix.rust_target }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: 'linebender/resvg'
          ref: ${{ github.event.inputs.tag }}
          path: resvg

      - name: Install license generator
        shell: bash
        run: cargo install cargo-about --version 0.8.4 --locked

      - name: Build resvg
        working-directory: resvg
        shell: bash
        run: |
          set -euo pipefail

          DIST_DIR="${{ github.workspace }}/dist/resvg-${RESVG_REF}-macos-${RESVG_ARTIFACT_ARCH}"

          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR"

          rustup target add "$RESVG_RUST_TARGET"

          export MACOSX_DEPLOYMENT_TARGET="$MACOS_MIN"
          export RUSTFLAGS="-C link-arg=-mmacosx-version-min=${MACOS_MIN}"

          cargo build --release --locked --target "$RESVG_RUST_TARGET" --package resvg --bin resvg

          cp "target/${RESVG_RUST_TARGET}/release/resvg" "$DIST_DIR/resvg"
          chmod +x "$DIST_DIR/resvg"
          strip -x "$DIST_DIR/resvg" || true

          echo "==> Verifying binary architecture"
          file "$DIST_DIR/resvg"
          if ! file "$DIST_DIR/resvg" | grep -q "$RESVG_BUILD_ARCH"; then
            echo "ERROR: resvg binary architecture does not match ${RESVG_BUILD_ARCH}"
            exit 1
          fi

          echo "==> Verifying linked dylibs"
          otool -L "$DIST_DIR/resvg"
          if otool -L "$DIST_DIR/resvg" | grep -E '/opt/homebrew|/usr/local/(Cellar|opt)' >/dev/null; then
            echo "ERROR: Homebrew runtime dependency leaked into final resvg binary"
            exit 1
          fi

          echo "==> Verifying macOS deployment target"
          DEPLOYMENT_INFO="$(vtool -show-build "$DIST_DIR/resvg" 2>/dev/null || otool -l "$DIST_DIR/resvg")"
          echo "$DEPLOYMENT_INFO"
          if [ "$RESVG_BUILD_ARCH" = "x86_64" ] && ! echo "$DEPLOYMENT_INFO" | grep -Eq 'minos 10\.13|version 10\.13'; then
            echo "ERROR: expected x64 resvg binary to target macOS 10.13"
            exit 1
          fi

      - name: Assemble license notices
        working-directory: resvg
        shell: bash
        run: |
          set -euo pipefail

          DIST_DIR="${{ github.workspace }}/dist/resvg-${RESVG_REF}-macos-${RESVG_ARTIFACT_ARCH}"
          LICENSES_MD="$DIST_DIR/LICENSES-ALL.md"
          ABOUT_CONFIG="$RUNNER_TEMP/resvg-about.toml"
          ABOUT_TEMPLATE="$RUNNER_TEMP/resvg-licenses.hbs"

          cat > "$ABOUT_CONFIG" <<'EOF'
          accepted = [
              "Apache-2.0",
              "MIT",
              "BSD-2-Clause",
              "BSD-3-Clause",
              "ISC",
              "Zlib",
              "Unicode-3.0",
              "Unicode-DFS-2016",
              "CC0-1.0",
              "BSL-1.0",
          ]

          targets = [
              "aarch64-apple-darwin",
              "x86_64-apple-darwin",
          ]

          ignore-dev-dependencies = true
          EOF

          cat > "$ABOUT_TEMPLATE" <<'EOF'
          {{#each licenses}}
          ### License: {{name}}
          #### Used by:
          {{#each used_by}}
          - [{{crate.name}} {{crate.version}}]({{#if crate.repository}}{{crate.repository}}{{else}}https://crates.io/crates/{{crate.name}}{{/if}})
          {{/each}}
          #### License text
          ```
          {{text}}
          ```

          {{/each}}
          EOF

          cargo about generate \
            --config "$ABOUT_CONFIG" \
            --manifest-path Cargo.toml \
            --workspace \
            --locked \
            --fail \
            --output-file "$LICENSES_MD" \
            "$ABOUT_TEMPLATE"

          test -s "$LICENSES_MD"

      - name: Package artifact
        run: |
          zip -X -j \
            "resvg-${{ github.event.inputs.tag }}-macos-${{ matrix.artifact_arch }}.zip" \
            "dist/resvg-${{ github.event.inputs.tag }}-macos-${{ matrix.artifact_arch }}/resvg" \
            "dist/resvg-${{ github.event.inputs.tag }}-macos-${{ matrix.artifact_arch }}/LICENSES-ALL.md"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          path: resvg-${{ github.event.inputs.tag }}-macos-${{ matrix.artifact_arch }}.zip
          if-no-files-found: error
          archive: false

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: write }

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: resvg-${{ github.event.inputs.tag }}-macos-*.zip
          path: release
          merge-multiple: true

      - uses: ncipollo/release-action@v1.21.0
        with:
          tag: resvg-${{ github.event.inputs.tag }}
          name: resvg-${{ github.event.inputs.tag }}
          artifacts: 'release/*.zip'
          allowUpdates: true
          artifactErrorsFailBuild: true
