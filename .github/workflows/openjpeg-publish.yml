name: 'openjpeg-publish'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to clone'
        required: true
        type: string

jobs:
  build:
    name: build-${{ matrix.platform }}-${{ matrix.artifact_arch }}
    runs-on: ${{ matrix.runner }}
    permissions: { contents: read }

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            artifact_arch: arm64
            arch: arm64
            macos_min: '11.0'
            runner: macos-latest
          - platform: macos
            artifact_arch: x64
            arch: x86_64
            macos_min: '10.15'
            runner: macos-15-intel
          - platform: linux
            artifact_arch: x64
            arch: x86_64
            runner: ubuntu-24.04
          - platform: linux
            artifact_arch: arm64
            arch: aarch64
            runner: ubuntu-24.04-arm
          - platform: windows
            artifact_arch: x64
            arch: x86_64
            runner: windows-latest
          - platform: windows
            artifact_arch: arm64
            arch: aarch64
            runner: windows-11-arm

    env:
      MACOS_MIN: ${{ matrix.macos_min }}
      OPENJPEG_ARTIFACT_ARCH: ${{ matrix.artifact_arch }}
      OPENJPEG_BUILD_ARCH: ${{ matrix.arch }}
      OPENJPEG_PLATFORM: ${{ matrix.platform }}
      OPENJPEG_REF: ${{ github.event.inputs.tag }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: 'uclouvain/openjpeg'
          ref: ${{ github.event.inputs.tag }}
          path: openjpeg

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build self-contained openjpeg tools (macOS)
        if: matrix.platform == 'macos'
        working-directory: openjpeg
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$(pwd)"
          BUILD_DIR="$ROOT/build"
          DIST_DIR="${{ github.workspace }}/dist/openjpeg-${OPENJPEG_REF}-${OPENJPEG_PLATFORM}-${OPENJPEG_ARTIFACT_ARCH}"

          rm -rf "$BUILD_DIR" "$DIST_DIR"
          mkdir -p "$DIST_DIR"

          cmake -S . -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${OPENJPEG_BUILD_ARCH}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${MACOS_MIN}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC_LIBS=ON \
            -DBUILD_CODEC=ON \
            -DBUILD_JPIP=OFF \
            -DBUILD_JPIP_SERVER=OFF \
            -DBUILD_JAVA=OFF \
            -DBUILD_VIEWER=OFF \
            -DBUILD_MJ2=OFF \
            -DBUILD_JPWL=OFF \
            -DBUILD_THIRDPARTY=ON \
            -DBUILD_DOC=OFF \
            -DBUILD_TESTING=OFF \
            -Wno-dev

          cmake --build "$BUILD_DIR" --config Release --parallel --verbose

          OPJ_COMPRESS="$(find "$BUILD_DIR" -type f -name opj_compress | head -n1)"
          OPJ_DECOMPRESS="$(find "$BUILD_DIR" -type f -name opj_decompress | head -n1)"
          OPJ_DUMP="$(find "$BUILD_DIR" -type f -name opj_dump | head -n1)"

          test -n "$OPJ_COMPRESS"
          test -n "$OPJ_DECOMPRESS"
          test -n "$OPJ_DUMP"

          cp "$OPJ_COMPRESS" "$DIST_DIR/opj_compress"
          cp "$OPJ_DECOMPRESS" "$DIST_DIR/opj_decompress"
          cp "$OPJ_DUMP" "$DIST_DIR/opj_dump"
          chmod +x "$DIST_DIR/opj_compress" "$DIST_DIR/opj_decompress" "$DIST_DIR/opj_dump"

          strip -x "$DIST_DIR/opj_compress" "$DIST_DIR/opj_decompress" "$DIST_DIR/opj_dump" || true

          echo "==> Verifying linked dylibs"
          otool -L "$DIST_DIR/opj_compress" "$DIST_DIR/opj_decompress" "$DIST_DIR/opj_dump"

          if otool -L "$DIST_DIR/opj_compress" "$DIST_DIR/opj_decompress" "$DIST_DIR/opj_dump" | grep -E '/opt/homebrew|/usr/local/(Cellar|opt)' >/dev/null; then
            echo "ERROR: Homebrew runtime dependency leaked into final openjpeg binaries"
            exit 1
          fi

      - name: Build self-contained openjpeg tools (Linux)
        if: matrix.platform == 'linux'
        working-directory: openjpeg
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$(pwd)"
          BUILD_DIR="$ROOT/build"
          DIST_DIR="${{ github.workspace }}/dist/openjpeg-${OPENJPEG_REF}-${OPENJPEG_PLATFORM}-${OPENJPEG_ARTIFACT_ARCH}"

          rm -rf "$BUILD_DIR" "$DIST_DIR"
          mkdir -p "$DIST_DIR"

          cmake -S . -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC_LIBS=ON \
            -DBUILD_CODEC=ON \
            -DBUILD_JPIP=OFF \
            -DBUILD_JPIP_SERVER=OFF \
            -DBUILD_JAVA=OFF \
            -DBUILD_VIEWER=OFF \
            -DBUILD_MJ2=OFF \
            -DBUILD_JPWL=OFF \
            -DBUILD_THIRDPARTY=ON \
            -DBUILD_DOC=OFF \
            -DBUILD_TESTING=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc" \
            -Wno-dev

          cmake --build "$BUILD_DIR" --config Release --parallel --verbose

          OPJ_COMPRESS="$(find "$BUILD_DIR" -type f -name opj_compress | head -n1)"
          OPJ_DECOMPRESS="$(find "$BUILD_DIR" -type f -name opj_decompress | head -n1)"
          OPJ_DUMP="$(find "$BUILD_DIR" -type f -name opj_dump | head -n1)"

          test -n "$OPJ_COMPRESS"
          test -n "$OPJ_DECOMPRESS"
          test -n "$OPJ_DUMP"

          cp "$OPJ_COMPRESS" "$DIST_DIR/opj_compress"
          cp "$OPJ_DECOMPRESS" "$DIST_DIR/opj_decompress"
          cp "$OPJ_DUMP" "$DIST_DIR/opj_dump"
          chmod +x "$DIST_DIR/opj_compress" "$DIST_DIR/opj_decompress" "$DIST_DIR/opj_dump"

          strip "$DIST_DIR/opj_compress" "$DIST_DIR/opj_decompress" "$DIST_DIR/opj_dump" || true

          echo "==> Verifying binary architecture"
          file "$DIST_DIR/opj_compress"
          if [[ "${OPENJPEG_BUILD_ARCH}" == "x86_64" ]] && ! file "$DIST_DIR/opj_compress" | grep -q 'x86-64'; then
            echo "ERROR: expected x86_64 binary"
            exit 1
          fi
          if [[ "${OPENJPEG_BUILD_ARCH}" == "aarch64" ]] && ! file "$DIST_DIR/opj_compress" | grep -qE 'ARM aarch64|aarch64'; then
            echo "ERROR: expected aarch64 binary"
            exit 1
          fi

          echo "==> Verifying linked libraries"
          ldd "$DIST_DIR/opj_compress"
          if ldd "$DIST_DIR/opj_compress" | grep -E "${GITHUB_WORKSPACE}|/opt/hostedtoolcache|/home/linuxbrew|not found" >/dev/null; then
            echo "ERROR: Linux binary leaked a runner-specific dependency"
            exit 1
          fi

      - name: Build self-contained openjpeg tools (Windows)
        if: matrix.platform == 'windows'
        working-directory: openjpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $Root = (Get-Location).Path
          $BuildDir = Join-Path $Root "build"
          $DistDir = Join-Path $Env:GITHUB_WORKSPACE "dist\openjpeg-$Env:OPENJPEG_REF-$Env:OPENJPEG_PLATFORM-$Env:OPENJPEG_ARTIFACT_ARCH"

          if (Test-Path $BuildDir) { Remove-Item -Recurse -Force $BuildDir }
          if (Test-Path $DistDir) { Remove-Item -Recurse -Force $DistDir }
          New-Item -ItemType Directory -Path $DistDir | Out-Null

          Write-Host "==> Configuring openjpeg"
          cmake -S . -B $BuildDir `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_SYSTEM_VERSION=10.0 `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_STATIC_LIBS=ON `
            -DBUILD_CODEC=ON `
            -DBUILD_JPIP=OFF `
            -DBUILD_JPIP_SERVER=OFF `
            -DBUILD_JAVA=OFF `
            -DBUILD_VIEWER=OFF `
            -DBUILD_MJ2=OFF `
            -DBUILD_JPWL=OFF `
            -DBUILD_THIRDPARTY=ON `
            -DBUILD_DOC=OFF `
            -DBUILD_TESTING=OFF `
            -Wno-dev

          Write-Host "==> Building openjpeg"
          cmake --build $BuildDir --config Release --parallel --verbose

          $OPJCompress = Get-ChildItem -Recurse -Path $BuildDir -Filter "opj_compress.exe" | Select-Object -First 1
          $OPJDecompress = Get-ChildItem -Recurse -Path $BuildDir -Filter "opj_decompress.exe" | Select-Object -First 1
          $OPJDump = Get-ChildItem -Recurse -Path $BuildDir -Filter "opj_dump.exe" | Select-Object -First 1

          if (-not $OPJCompress) { throw "opj_compress.exe not found after build" }
          if (-not $OPJDecompress) { throw "opj_decompress.exe not found after build" }
          if (-not $OPJDump) { throw "opj_dump.exe not found after build" }

          Copy-Item $OPJCompress.FullName "$DistDir\opj_compress.exe"
          Copy-Item $OPJDecompress.FullName "$DistDir\opj_decompress.exe"
          Copy-Item $OPJDump.FullName "$DistDir\opj_dump.exe"

          Write-Host "==> Verifying binaries"
          foreach ($bin in @("opj_compress.exe", "opj_decompress.exe", "opj_dump.exe")) {
            $f = Get-Item "$DistDir\$bin"
            if ($f.Length -eq 0) { throw "$bin is empty" }
            Write-Host "$($f.Name): $($f.Length) bytes"
          }

      - name: Assemble license notices (macOS/Linux)
        if: matrix.platform != 'windows'
        working-directory: openjpeg
        shell: bash
        run: |
          set -euo pipefail

          DIST_DIR="${{ github.workspace }}/dist/openjpeg-${OPENJPEG_REF}-${OPENJPEG_PLATFORM}-${OPENJPEG_ARTIFACT_ARCH}"
          LICENSES_MD="$DIST_DIR/LICENSES-ALL.md"

          ZLIB_VERSION="$(awk '/^#define ZLIB_VERSION / { gsub(/"/, "", $3); print $3; exit }' thirdparty/libz/zlib.h)"
          LIBPNG_VERSION="$(awk '/^#define PNG_LIBPNG_VER_STRING / { gsub(/"/, "", $3); print $3; exit }' thirdparty/libpng/png.h)"
          LIBTIFF_VERSION="$(awk '/TIFFLIB_VERSION_STR/ && match($0, /Version [0-9.]+/) { print substr($0, RSTART + 8, RLENGTH - 8); exit }' thirdparty/libtiff/tiffvers.h 2>/dev/null || true)"
          if [ -z "$LIBTIFF_VERSION" ]; then
            LIBTIFF_VERSION="$(awk '/TIFFLIB_VERSION_STR/ && match($0, /Version [0-9.]+/) { print substr($0, RSTART + 8, RLENGTH - 8); exit }' thirdparty/libtiff/tiffvers.h.in)"
          fi
          LCMS2_VERSION="$(
            awk '
              /^#define LCMS_VERSION / {
                major = int($3 / 1000)
                minor = int(($3 % 1000) / 10)
                patch = $3 % 10
                printf "%d.%d.%d\n", major, minor, patch
                exit
              }
            ' thirdparty/liblcms2/include/lcms2.h
          )"

          : > "$LICENSES_MD"

          printf '### License: BSD-2-Clause\n' >> "$LICENSES_MD"
          printf '#### Used by: [openjpeg %s](https://github.com/uclouvain/openjpeg)\n' "$OPENJPEG_REF" >> "$LICENSES_MD"
          printf '#### License text\n```\n' >> "$LICENSES_MD"
          cat LICENSE >> "$LICENSES_MD"
          printf '\n```\n\n' >> "$LICENSES_MD"

          printf '### License: Zlib\n' >> "$LICENSES_MD"
          printf '#### Used by: [zlib %s](https://zlib.net/)\n' "$ZLIB_VERSION" >> "$LICENSES_MD"
          printf '#### License text\n```\n' >> "$LICENSES_MD"
          awk '
            BEGIN { in_comment = 0 }
            /^[[:space:]]*\/\*/ { in_comment = 1 }
            in_comment { print }
            /\*\// && in_comment { exit }
          ' thirdparty/libz/zlib.h >> "$LICENSES_MD"
          printf '\n```\n\n' >> "$LICENSES_MD"

          printf '### License: Libpng\n' >> "$LICENSES_MD"
          printf '#### Used by: [libpng %s](https://github.com/pnggroup/libpng)\n' "$LIBPNG_VERSION" >> "$LICENSES_MD"
          printf '#### License text\n```\n' >> "$LICENSES_MD"
          cat thirdparty/libpng/LICENSE >> "$LICENSES_MD"
          printf '\n```\n\n' >> "$LICENSES_MD"

          printf '### License: libtiff\n' >> "$LICENSES_MD"
          printf '#### Used by: [libtiff %s](https://gitlab.com/libtiff/libtiff)\n' "$LIBTIFF_VERSION" >> "$LICENSES_MD"
          printf '#### License text\n```\n' >> "$LICENSES_MD"
          awk '
            BEGIN { in_comment = 0 }
            /^[[:space:]]*\/\*/ { in_comment = 1 }
            in_comment { print }
            /\*\// && in_comment { exit }
          ' thirdparty/libtiff/tiff.h >> "$LICENSES_MD"
          printf '\n```\n\n' >> "$LICENSES_MD"

          printf '### License: MIT\n' >> "$LICENSES_MD"
          printf '#### Used by: [lcms2 %s](https://github.com/mm2/Little-CMS)\n' "$LCMS2_VERSION" >> "$LICENSES_MD"
          printf '#### License text\n```\n' >> "$LICENSES_MD"
          if [ -s thirdparty/liblcms2/COPYING ]; then
            cat thirdparty/liblcms2/COPYING >> "$LICENSES_MD"
          else
            awk '
              BEGIN { in_comment = 0 }
              /^[[:space:]]*\/\*/ { in_comment = 1 }
              in_comment { print }
              /\*\// && in_comment { exit }
            ' thirdparty/liblcms2/include/lcms2.h >> "$LICENSES_MD"
          fi
          printf '\n```\n' >> "$LICENSES_MD"

          test -s "$LICENSES_MD"

      - name: Assemble license notices (Windows)
        if: matrix.platform == 'windows'
        working-directory: openjpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $DistDir = Join-Path $Env:GITHUB_WORKSPACE "dist\openjpeg-$Env:OPENJPEG_REF-$Env:OPENJPEG_PLATFORM-$Env:OPENJPEG_ARTIFACT_ARCH"
          $LicensesMd = Join-Path $DistDir "LICENSES-ALL.md"

          $ZlibH = "thirdparty\libz\zlib.h"
          $PngH = "thirdparty\libpng\png.h"
          $PngLicense = "thirdparty\libpng\LICENSE"
          $TiffH = "thirdparty\libtiff\tiff.h"
          $Lcms2H = "thirdparty\liblcms2\include\lcms2.h"
          $Lcms2Copying = "thirdparty\liblcms2\COPYING"

          $ZlibVersion = (Select-String -Path $ZlibH -Pattern '^#define ZLIB_VERSION\s+"([^"]+)"').Matches[0].Groups[1].Value
          $LibpngVersion = (Select-String -Path $PngH -Pattern '^#define PNG_LIBPNG_VER_STRING\s+"([^"]+)"').Matches[0].Groups[1].Value
          $Lcms2Raw = [int](Select-String -Path $Lcms2H -Pattern '^#define LCMS_VERSION\s+(\d+)').Matches[0].Groups[1].Value
          $Lcms2Version = "$([int]($Lcms2Raw / 1000)).$([int](($Lcms2Raw % 1000) / 10)).$([int]($Lcms2Raw % 10))"

          $TiffVersion = ''
          foreach ($tv in @("thirdparty\libtiff\tiffvers.h", "thirdparty\libtiff\tiffvers.h.in")) {
            if (Test-Path $tv) {
              $m = Select-String -Path $tv -Pattern 'Version\s+([\d.]+)'
              if ($m) { $TiffVersion = $m.Matches[0].Groups[1].Value; break }
            }
          }

          function Get-FirstCComment([string]$Path) {
            $lines = Get-Content $Path
            $in = $false
            $result = [System.Collections.Generic.List[string]]::new()
            foreach ($line in $lines) {
              if (-not $in -and $line -match '^\s*/\*') { $in = $true }
              if ($in) {
                $result.Add($line)
                if ($line -match '\*/') { break }
              }
            }
            return $result -join "`n"
          }

          $Nl = "`n"
          $Content = ""

          $Content += "### License: BSD-2-Clause$Nl"
          $Content += "#### Used by: [openjpeg $Env:OPENJPEG_REF](https://github.com/uclouvain/openjpeg)$Nl"
          $Content += "#### License text$Nl``````$Nl"
          $Content += (Get-Content "LICENSE" -Raw)
          $Content += "$Nl``````$Nl$Nl"

          $Content += "### License: Zlib$Nl"
          $Content += "#### Used by: [zlib $ZlibVersion](https://zlib.net/)$Nl"
          $Content += "#### License text$Nl``````$Nl"
          $Content += (Get-FirstCComment $ZlibH)
          $Content += "$Nl``````$Nl$Nl"

          $Content += "### License: Libpng$Nl"
          $Content += "#### Used by: [libpng $LibpngVersion](https://github.com/pnggroup/libpng)$Nl"
          $Content += "#### License text$Nl``````$Nl"
          $Content += (Get-Content $PngLicense -Raw)
          $Content += "$Nl``````$Nl$Nl"

          $Content += "### License: libtiff$Nl"
          $Content += "#### Used by: [libtiff $TiffVersion](https://gitlab.com/libtiff/libtiff)$Nl"
          $Content += "#### License text$Nl``````$Nl"
          $Content += (Get-FirstCComment $TiffH)
          $Content += "$Nl``````$Nl$Nl"

          $Content += "### License: MIT$Nl"
          $Content += "#### Used by: [lcms2 $Lcms2Version](https://github.com/mm2/Little-CMS)$Nl"
          $Content += "#### License text$Nl``````$Nl"
          if (Test-Path $Lcms2Copying) {
            $Content += (Get-Content $Lcms2Copying -Raw)
          } else {
            $Content += (Get-FirstCComment $Lcms2H)
          }
          $Content += "$Nl``````$Nl"

          [System.IO.File]::WriteAllText($LicensesMd, $Content, [System.Text.Encoding]::UTF8)

          if (-not (Test-Path $LicensesMd) -or (Get-Item $LicensesMd).Length -eq 0) {
            throw "LICENSES-ALL.md is empty or missing"
          }

      - name: Package artifact (macOS/Linux)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          DIST_DIR="dist/openjpeg-${OPENJPEG_REF}-${OPENJPEG_PLATFORM}-${OPENJPEG_ARTIFACT_ARCH}"
          zip -X -j \
            "openjpeg-${OPENJPEG_REF}-${OPENJPEG_PLATFORM}-${OPENJPEG_ARTIFACT_ARCH}.zip" \
            "${DIST_DIR}/opj_compress" \
            "${DIST_DIR}/opj_decompress" \
            "${DIST_DIR}/opj_dump" \
            "${DIST_DIR}/LICENSES-ALL.md"

      - name: Package artifact (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $DistDir = Join-Path $Env:GITHUB_WORKSPACE "dist\openjpeg-$Env:OPENJPEG_REF-$Env:OPENJPEG_PLATFORM-$Env:OPENJPEG_ARTIFACT_ARCH"
          $ZipPath = Join-Path $Env:GITHUB_WORKSPACE "openjpeg-$Env:OPENJPEG_REF-$Env:OPENJPEG_PLATFORM-$Env:OPENJPEG_ARTIFACT_ARCH.zip"

          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($ZipPath, [System.IO.Compression.ZipArchiveMode]::Create)
          [void][System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, "$DistDir\opj_compress.exe", "opj_compress.exe")
          [void][System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, "$DistDir\opj_decompress.exe", "opj_decompress.exe")
          [void][System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, "$DistDir\opj_dump.exe", "opj_dump.exe")
          [void][System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, "$DistDir\LICENSES-ALL.md", "LICENSES-ALL.md")
          $zip.Dispose()

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          path: openjpeg-${{ github.event.inputs.tag }}-${{ matrix.platform }}-${{ matrix.artifact_arch }}.zip
          if-no-files-found: error
          archive: false

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: write }

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: openjpeg-${{ github.event.inputs.tag }}-*.zip
          path: release
          merge-multiple: true
          skip-decompress: true

      - uses: ncipollo/release-action@v1.21.0
        with:
          tag: openjpeg-${{ github.event.inputs.tag }}
          name: openjpeg-${{ github.event.inputs.tag }}
          artifacts: 'release/*.zip'
          allowUpdates: true
          artifactErrorsFailBuild: true
